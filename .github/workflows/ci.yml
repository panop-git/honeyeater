name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
    # labeled/unlabeled so toggling the non-functional label re-runs the
    # version-discipline check; the rest are the pull_request defaults.
    types: [opened, synchronize, reopened, labeled, unlabeled]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: short
  CARGO_INCREMENTAL: 0

permissions:
  contents: read

jobs:
  fmt:
    name: rustfmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check

  clippy:
    name: clippy (${{ matrix.toolchain }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.91", nightly]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: clippy
      - uses: Swatinem/rust-cache@v2
      - run: cargo clippy --workspace --all-targets -- -D warnings

  test:
    name: test (${{ matrix.toolchain }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        toolchain: [stable, "1.91", nightly]
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo test --workspace --all-targets
      - run: cargo test --workspace --doc

  doc:
    name: rustdoc
    runs-on: ubuntu-latest
    env:
      RUSTDOCFLAGS: -D warnings
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - run: cargo doc --workspace --no-deps --document-private-items

  deny:
    name: cargo-deny
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          command: check
          arguments: --all-features

  # Every commit must carry a Signed-off-by trailer certifying the Developer
  # Certificate of Origin (DCO.txt; CONTRIBUTING.md, "Licensing and sign-off").
  dco:
    name: DCO sign-off
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check Signed-off-by on every commit
        run: |
          if [ "$GITHUB_EVENT_NAME" = "pull_request" ]; then
            commits=$(git rev-list --no-merges "$BASE_SHA..$HEAD_SHA")
          elif [ "$BEFORE_SHA" != "0000000000000000000000000000000000000000" ]; then
            commits=$(git rev-list --no-merges "$BEFORE_SHA..$GITHUB_SHA")
          else
            commits=$GITHUB_SHA
          fi
          status=0
          for sha in $commits; do
            if ! git show -s --format=%B "$sha" | grep -qE '^Signed-off-by: .+ <.+@.+>'; then
              echo "::error::commit $sha lacks a Signed-off-by trailer; sign off with 'git commit -s' (see CONTRIBUTING.md, \"Licensing and sign-off\")"
              status=1
            fi
          done
          exit $status
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          BEFORE_SHA: ${{ github.event.before }}

  # Version discipline (CONTRIBUTING.md, "Versioning"). The [workspace.package]
  # version in the root Cargo.toml is the single source of truth. Two checks:
  # CHANGELOG.md's newest release heading must match it, and every functional
  # PR into main must increment it. Docs-only diffs are exempt automatically;
  # other non-functional changes are exempted with the 'non-functional' label.
  version:
    name: version discipline
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: CHANGELOG.md references the Cargo.toml version
        run: |
          manifest=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          changelog=$(grep -m1 -E '^## \[[0-9]' CHANGELOG.md | sed -E 's/^## \[([^]]+)\].*/\1/')
          if [ "$manifest" != "$changelog" ]; then
            echo "::error::Cargo.toml [workspace.package] version is $manifest but CHANGELOG.md's newest release heading is [$changelog]; add or fix the CHANGELOG section for $manifest"
            exit 1
          fi
      - name: Functional PRs increment the version
        if: github.event_name == 'pull_request' && !contains(github.event.pull_request.labels.*.name, 'non-functional')
        env:
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          functional=$(git diff --name-only "$BASE_SHA" "$HEAD_SHA" \
            | grep -vE '^(docs/|assets/|\.github/|\.cloudflare/)' \
            | grep -vE '^(book\.toml|wrangler\.jsonc|\.gitignore|DCO\.txt|LICENSE-.+)$' \
            | grep -vE '\.md$' || true)
          if [ -z "$functional" ]; then
            echo "docs-only diff; version bump not required"
            exit 0
          fi
          base=$(git show "$BASE_SHA:Cargo.toml" | grep -m1 '^version = ' | cut -d'"' -f2)
          head=$(grep -m1 '^version = ' Cargo.toml | cut -d'"' -f2)
          # Bootstrap release: the first release establishes 0.0.0 and has no
          # prior version to increment from, so the bump rule cannot apply.
          if [ "$base" = "0.0.0" ] && [ "$head" = "0.0.0" ]; then
            echo "bootstrap release at 0.0.0; version bump not required"
            exit 0
          fi
          highest=$(printf '%s\n%s\n' "$base" "$head" | sort -V | tail -n1)
          if [ "$base" = "$head" ] || [ "$highest" != "$head" ]; then
            echo "::error::functional change without a version increment (main is at $base, this PR has $head); bump [workspace.package] version in the root Cargo.toml, or apply the 'non-functional' label if nothing shipped changes"
            exit 1
          fi

  # Verifies the mdBook narrative documentation builds. Deployment is handled
  # out-of-band by Cloudflare Workers Builds (its Git integration watches the
  # repo directly and runs .cloudflare/build-docs.sh in its own runners).
  book:
    name: mdbook build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install mdBook
        run: |
          mkdir -p "$HOME/.local/bin"
          curl -sSL https://github.com/rust-lang/mdBook/releases/download/v0.5.3/mdbook-v0.5.3-x86_64-unknown-linux-gnu.tar.gz \
            | tar -xz -C "$HOME/.local/bin"
          echo "$HOME/.local/bin" >> "$GITHUB_PATH"
      - name: Build the book
        run: mdbook build
