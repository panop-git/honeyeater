# Clippy tuning for honeyeater.
#
# The set of *enabled* lints lives in `[workspace.lints.clippy]` in the root
# Cargo.toml — pedantic warn, nursery allow, cargo warn, plus a small
# allow-list of pedantic lints deemed too noisy. This file tunes the
# thresholds of individual lints, not their enabled/disabled state.
#
# Rationale: docs/policies.md, "Clippy posture".

# Match MSRV so clippy doesn't suggest features unavailable to our oldest
# supported compiler. Keep in sync with `rust-version` in Cargo.toml.
msrv = "1.91"

# Pre-0.0.1: we have no stable public API yet, so don't warn about changes
# that would be breaking. Revisit when we cut 0.1.0.
avoid-breaking-exported-api = false

# Threshold tuning. These are sane defaults for a numerical library:
# DSP code routinely has functions with many parameters (filter design),
# kernels with high cyclomatic complexity (correlator inner loops), and
# tests with long arrays of magic numbers (reference vectors).
too-many-arguments-threshold = 10
cognitive-complexity-threshold = 30
type-complexity-threshold = 350

# Doc-comment identifiers that the `doc_markdown` lint should accept without
# requiring backticks. Each is a real proper noun that recurs in honeyeater's
# RF/SDR vocabulary; backticking would suggest they're code identifiers when
# they're vendor or organisation names.
doc-valid-idents = [
    # Defaults that clippy ships with — must be re-listed when overriding.
    "KiB", "MiB", "GiB", "TiB", "PiB", "EiB",
    "DirectX", "ECMAScript",
    "GPLv2", "GPLv3", "GitHub", "GitLab",
    "IPv4", "IPv6",
    "ClojureScript", "CoffeeScript", "JavaScript", "PureScript", "TypeScript", "WebAssembly",
    "NaN", "NaNs",
    "OAuth", "GraphQL",
    "OCaml",
    "OpenAL", "OpenDNS", "OpenGL", "OpenMP", "OpenSSH", "OpenSSL", "OpenStreetMap", "OpenTelemetry", "OpenType",
    "WebGL", "WebGL2", "WebGPU", "WebRTC", "WebSocket", "WebTransport",
    "TensorFlow", "TrueType",
    "iOS", "macOS", "FreeBSD", "NetBSD", "NixOS",
    "TLSv1", "TLSv1.1", "TLSv1.2", "TLSv1.3",
    "IPv4Addr", "IPv6Addr",
    "..",

    # honeyeater additions: SDR hardware vendors and product lines.
    "BladeRF", "HackRF", "LimeSDR", "LimeSDR-Mini", "LimeSDR-USB",
    "SDRplay", "RTL-SDR", "AirspyHF", "SoapySDR",
    "ADALM-Pluto", "PlutoSDR",
    "RedPitaya", "STEMlab",
    "FunCube", "FCDPP",
    "USRP", "Sidekiq",
    "XTRX", "NetSDR",

    # honeyeater additions: software references.
    "GNU Radio", "GNURadio", "FutureSDR", "RustRadio",
    "scipy", "numpy", "liquid-dsp", "libfec",
    "AFF3CT", "MATLAB", "Octave", "rustfft", "realfft",
    "CCSDS", "DVB-S2", "DVB-S2X", "DVB-T2",
    "Eb/N0", "Es/N0",
]
